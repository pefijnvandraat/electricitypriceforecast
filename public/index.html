<!doctype html>
<html lang="nl" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title data-i18n="t">Stroomprijs voorspeller</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <div class="titlebar">
      <div>
        <h1 data-i18n="t">Stroomprijs voorspeller</h1>
        <p class="sub" data-i18n="s">Dynamische consumentenprijs &middot; uitsluitend publieke data &middot; dagelijks ververst</p>
      </div>
      <div class="utility">
        <label class="util">
          <span aria-hidden="true">&#127760;</span>
          <select id="lang" aria-label="Language"></select>
        </label>
        <button id="themeBtn" class="util themebtn" type="button" aria-label="Theme">
          <span id="themeIcon">&#127769;</span>
        </button>
      </div>
    </div>
  </header>

  <section class="controls">
    <label><span data-i18n="zone">Zone</span>
      <select id="zone"></select>
    </label>
    <label><span data-i18n="price">Prijs</span>
      <select id="mode">
        <option value="allin" data-i18n="allin">All-in (incl. belasting)</option>
        <option value="wholesale" data-i18n="whole">Kale marktprijs</option>
      </select>
    </label>
    <label title="" data-i18n-title="tip_hist"><span class="lab"><span data-i18n="back">Terugkijken</span>: <strong id="histLabel">1</strong> <span data-i18n="days">dagen</span></span>
      <input type="range" id="hist" min="1" max="730" value="1"/>
    </label>
    <label><span class="lab"><span data-i18n="fwd">Vooruit</span>: <strong id="fcLabel">7</strong> <span data-i18n="days">dagen</span></span>
      <input type="range" id="fc" min="1" max="16" value="7"/>
    </label>
    <label id="entsoeWrap" class="toggle" hidden><span data-i18n="val">ENTSO-E validatie</span>
      <span class="switch">
        <input type="checkbox" id="entsoe"/>
        <span class="slider"></span>
      </span>
    </label>
    <label class="toggle"><span data-i18n="detail">Details bij aanwijzen</span>
      <span class="switch">
        <input type="checkbox" id="detail"/>
        <span class="slider"></span>
      </span>
    </label>
  </section>

  <div id="chart"></div>
  <footer id="meta">Laden&hellip;</footer>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
