name: Refresh forecast & deploy

on:
  schedule:
    - cron: "30 12 * * *"     # daily 12:30 UTC (14:30 CET) - after the ~12:45 CET day-ahead publication
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build forecast data
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: python -m forecaster.run

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
