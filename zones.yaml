# Configuration for the electricity price forecaster.
# Only zones listed in `enabled` are fetched, modelled and published.
# A zone is shown as "all-in" (incl. taxes) only when `priced: true` and a
# verified `taxes` block is present. Otherwise only the wholesale price is shown.
#
# Price source: Energy-Charts (Fraunhofer, no token). Every enabled zone was
# verified to return day-ahead price data. Weather (Open-Meteo), gas (TTF) and
# CO2 (KRBN proxy) are available everywhere, so all listed zones qualify for the
# wholesale forecast. Consumer all-in pricing is currently verified only for NL.

enabled: [NL,AT,BE,BG,CH,CZ,DE_LU,DK1,DK2,EE,ES,FI,FR,GR,HR,HU,IT_North,IT_Centre_North,IT_Centre_South,IT_South,IT_Sicily,IT_Sardinia,IT_Calabria,LT,LV,ME,NO1,NO2,NO3,NO4,NO5,PL,PT,RO,RS,SE1,SE2,SE3,SE4,SI,SK]

defaults:
  gas_symbol: "TTF=F"
  co2_symbol: "KRBN"
  history_days_export: 730
  history_days_train: 730
  forecast_horizon_days: 16

zones:
  NL:
    name: "Nederland"
    entsoe_eic: "10YNL----------L"
    entsoe_eic_bzn: "NL"
    timezone: "Europe/Amsterdam"
    holidays: "NL"
    priced: true
    weather_points:
      - { lat: 52.00, lon: 3.70, weight: 0.30, role: wind }
      - { lat: 52.50, lon: 4.20, weight: 0.20, role: wind }
      - { lat: 53.44, lon: 6.83, weight: 0.10, role: wind }
      - { lat: 52.50, lon: 5.60, weight: 0.15, role: wind }
      - { lat: 52.10, lon: 5.18, weight: 0.15, role: solar }
      - { lat: 50.85, lon: 5.69, weight: 0.10, role: solar }
    taxes:
      energiebelasting_eur_per_kwh: 0.1108
      btw_pct: 21
      belastingvermindering_eur_per_jaar: 628.96
      leveranciersopslag_eur_per_kwh: 0.02
      bands: { s1: 0.1108, s2: 0.1108, s3: 0.0807, s4: 0.0452 }

  AT:
    name: "Osterreich"
    entsoe_eic_bzn: "AT"
